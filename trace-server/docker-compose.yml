version: '3.8'

services:
  trace-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - API_KEY=${API_KEY:-change-this-in-production}
      - DB_PATH=/data/traces.db
      - NODE_ENV=production
    volumes:
      - trace-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  trace-data:
    driver: local
